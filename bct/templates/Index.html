<!DOCTYPE html>
<html>
<head>
    <title>Blockchain Transactions</title>
    <style>
        body { font-family: Arial; background-color: #f2f2f2; }
        .block {
            background: white;
            padding: 15px;
            margin: 15px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px gray;
        }
    </style>
</head>

<body>

<h1 align="center">Blockchain Transactions (6 Blocks)</h1>

{% for block in chain %}
<div class="block">
    <h3>Block {{ block.index }}</h3>
    <p><b>Timestamp:</b> {{ block.timestamp }}</p>
    <p><b>Transaction:</b> {{ block.data }}</p>
    <p><b>Proof:</b> {{ block.proof }}</p>
    <p><b>Previous Hash:</b> {{ block.previous_hash }}</p>
</div>
{% endfor %}

</body>
</html>
